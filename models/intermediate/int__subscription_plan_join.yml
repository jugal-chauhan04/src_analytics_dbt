version: 2

models:
  - name: int__subscription_plan_join
    description: >
      Grain: one row per subscription_id.

      Pure enrichment join — brings plan metadata onto each subscription record.
      No date generation, no calculations. Exists as a shared foundation so that
      int__mrr_join and int__subscription_payments_join don't each repeat the
      same join logic independently.

      Upstream: stg__subscriptions, stg__plans
      Downstream: int__mrr_join, int__subscription_payments_join
    columns:
      - name: subscription_id
        data_type: int64
        description: "Unique ID for each subscription"
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('stg__subscriptions')
                field: subscription_id

      - name: customer_id
        data_type: int64
        description: "The customer associated with this subscription"


      - name: plan_id
        data_type: int64
        description: "The plan this subscription belongs to"
        tests:
          - relationships:
              arguments:
                to: ref('stg__plans')
                field: plan_id

      - name: product_id
        data_type: int64
        description: "The product associated with this subscription's plan"

      - name: plan_name
        data_type: string
        description: "Name of the plan (Free, Pro, Premium)"

      - name: plan_price
        data_type: float64
        description: >
          List price of the plan before any discounts. For yearly plans this is
          the annual amount; for monthly plans this is the monthly amount.

      - name: billing_type
        data_type: string
        description: "Whether the plan is billed monthly or yearly"

      - name: start_date
        data_type: date
        description: "Date when the subscription started"

      - name: end_date
        data_type: date
        description: "Date when the subscription ended"


      - name: cancel_date
        data_type: date
        description: "Date when the subscription was cancelled. NULL if not cancelled."

      - name: status
        data_type: string
        description: "Current status of the subscription (active, cancelled, upgraded, downgraded)"