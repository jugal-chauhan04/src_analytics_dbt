version: 2

sources:
  - name: raw_src
    database: saas-pipeline
    schema: raw_src



    config:
      freshness:
        warn_after:
          count: 1
          period: day
        error_after:
          count: 7
          period: day
      loaded_at_field: loaded_at


    tables:
      - name: customers
      - name: subscriptions
      - name: invoices
      - name: line_items
      - name: payments
      - name: subscription_discounts
      - name: discounts
        config:
          freshness:
            null
      - name: plans
        config:
          freshness:
            null
      - name: products
        config:
          freshness:
            null