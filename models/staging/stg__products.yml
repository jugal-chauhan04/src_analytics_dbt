version: 2
models:
  - name: stg__products
    description: "Staging table for product data ingested from the raw source. This model cleans and standardizes product information for downstream use."
    columns:
      - name: product_id
        data_type: int64
        description: "Unique ID for each product"
        tests:
          - unique
          - not_null

      - name: product_name
        data_type: string
        description: "The name of the product"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['AutomateSRC', 'CollabSRC', 'InsightSRC']

      - name: product_description
        data_type: string
        description: "A description of the product"
        tests:
          - not_null